<div
  id="search-wrapper"
  class="invisible fixed inset-0 flex h-screen w-screen cursor-default flex-col bg-neutral-500/50 p-4 backdrop-blur-sm dark:bg-neutral-900/50 sm:p-6 md:p-[10vh] lg:p-[12vh] z-500"
  data-url="{{ "" | absLangURL }}">
  <div
    id="search-modal"
    class="flex flex-col w-full max-w-3xl min-h-0 mx-auto border rounded-md shadow-lg top-20 border-neutral-200 bg-neutral dark:border-neutral-700 dark:bg-neutral-800">
    <header class="relative z-10 flex items-center justify-between flex-none px-2">
      <form class="flex items-center flex-auto min-w-0">
        <div class="flex items-center justify-center w-8 h-8 text-neutral-400">
          {{ partial "icon.html" "search" }}
        </div>
        <input
          type="search"
          id="search-query"
          class="flex flex-auto h-12 mx-1 bg-transparent appearance-none focus:outline-dotted focus:outline-2 focus:outline-transparent"
          placeholder="{{ i18n "search.input_placeholder" }}"
          tabindex="0">
      </form>
      <button
        id="close-search-button"
        class="flex items-center justify-center w-8 h-8 text-neutral-700 hover:text-primary-600 dark:text-neutral dark:hover:text-primary-400"
        title="{{ i18n "search.close_button_title" }}">
        {{ partial "icon.html" "xmark" }}
      </button>
    </header>

    {{/* Category filter pills */}}
    <div id="search-filters" class="flex flex-wrap gap-1.5 px-4 pb-2 pt-1 border-b border-neutral-200 dark:border-neutral-700">
      <button class="search-filter-pill active" data-section="">All</button>
      {{ range .Site.Params.mainSections }}
      <button class="search-filter-pill" data-section="{{ . }}">{{ . | title }}</button>
      {{ end }}
    </div>

    <section class="flex-auto px-2 overflow-auto">
      <ul id="search-results"></ul>
    </section>
  </div>
</div>

<style>
.search-filter-pill {
  padding: 0.2rem 0.75rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 600;
  border: 1px solid rgba(128,128,128,0.25);
  background: transparent;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  color: inherit;
  opacity: 0.65;
}
.search-filter-pill:hover { opacity: 1; border-color: rgba(128,128,128,0.5); }
.search-filter-pill.active {
  background: rgb(var(--color-primary-500));
  border-color: rgb(var(--color-primary-500));
  color: #fff;
  opacity: 1;
}
</style>

<script>
(function () {
  var activeSection = '';

  document.addEventListener('DOMContentLoaded', function () {
    var pills = document.querySelectorAll('.search-filter-pill');
    pills.forEach(function (pill) {
      pill.addEventListener('click', function () {
        pills.forEach(function (p) { p.classList.remove('active'); });
        pill.classList.add('active');
        activeSection = pill.dataset.section || '';
        filterResults();
      });
    });
  });

  function filterResults() {
    var items = document.querySelectorAll('#search-results li[data-section]');
    items.forEach(function (li) {
      var sec = li.dataset.section || '';
      li.style.display = (!activeSection || sec === activeSection) ? '' : 'none';
    });
  }

  var origInsert = window.__searchInsert;
  window.__searchFilterCallback = filterResults;
})();
</script>
