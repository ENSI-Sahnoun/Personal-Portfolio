{{ with .Site.Params.github_username }}
<section class="custom-github-section">
  <h2 class="custom-section-title">GitHub Activity</h2>
  <div class="custom-github-stats-grid">

    <img
      src="https://github-readme-streak-stats.herokuapp.com?user={{ . }}&theme=transparent&hide_border=true&stroke=ffffff10&ring=c084fc&fire=e879f9&currStreakLabel=ffffff&sideLabels=a78bfa&dates=a78bfa&currStreakNum=ffffff&sideNums=ffffff"
      alt="GitHub Streak"
      loading="lazy"
    />

    <img
      src="https://github-readme-stats.vercel.app/api/top-langs/?username={{ . }}&layout=compact&theme=transparent&hide_border=true&title_color=ffffff&text_color=ffffff&hide=html"
      alt="Top Languages"
      loading="lazy"
    />

  </div>
</section>
{{ end }}
