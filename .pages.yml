media: assets/img

content:
  - name: content
    label: Content
    type: group
    items:
      - name: writeups
        label: Writeups
        type: collection
        path: content/writeups
        subfolders: true
        filename: "{slug}/index.md"
        exclude: ["_index.md"]
        view:
          fields: [title, date]
          primary: title
          sort: [date, title]
          default:
            sort: date
            order: desc
        fields:
          - name: title
            type: string
          - name: date
            type: datetime
          - name: description
            type: text
            required: false
          - name: tags
            type: list
            required: false
          - name: categories
            type: list
            required: false
          - name: weight
            type: number
            required: false
          - name: draft
            type: boolean
            default: false
          - name: body
            type: rich-text

