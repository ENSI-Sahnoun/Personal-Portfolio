backend:
  name: github
  repo: sah/personal-portfolio
  branch: main

media_folder: assets/img
public_folder: img

collections:
  - name: writeups
    label: Writeups
    label_singular: Writeup
    folder: content/writeups
    create: true
    format: frontmatter
    nested:
      depth: 100
      summary: '{{title}}'
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Weight, name: weight, widget: number, required: false, hint: 'Lower = higher in list' }

      - label: 'Feature Image'
        name: media
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Image, name: featureimage, widget: image, required: false }
          - { label: Caption, name: featureimagecaption, widget: string, required: false }
          - { label: Hero Style, name: heroStyle, widget: select, options: ['basic', 'big', 'background', 'thumbAndBackground'], required: false }

      - label: 'Visibility Toggles'
        name: display
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Table of Contents, name: showTableOfContents, widget: boolean, required: false }
          - { label: Breadcrumbs, name: showBreadcrumbs, widget: boolean, required: false }
          - { label: Tags & Categories, name: showTaxonomies, widget: boolean, required: false }
          - { label: Author Block, name: showAuthor, widget: boolean, required: false, default: true }
          - { label: Reading Time, name: showReadingTime, widget: boolean, required: false, default: true }
          - { label: Word Count, name: showWordCount, widget: boolean, required: false, default: true }
          - { label: Comments, name: showComments, widget: boolean, required: false }
          - { label: Pagination Nav, name: showPagination, widget: boolean, required: false, default: true }

      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Categories, name: categories, widget: list, required: false }
      - { label: External URL, name: externalUrl, widget: string, required: false, hint: 'Redirect to external site' }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: blog
    label: Blog
    label_singular: Post
    folder: content/blog
    path: '{{slug}}/index'
    create: true
    format: frontmatter
    slug: '{{slug}}'
    nested:
      depth: 100
      summary: '{{title}}'
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Weight, name: weight, widget: number, required: false, hint: 'Lower = higher in list' }
      - label: 'Feature Image'
        name: media
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Image, name: featureimage, widget: image, required: false }
          - { label: Caption, name: featureimagecaption, widget: string, required: false }
          - { label: Hero Style, name: heroStyle, widget: select, options: ['basic', 'big', 'background', 'thumbAndBackground'], required: false }
      - label: 'Visibility Toggles'
        name: display
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Table of Contents, name: showTableOfContents, widget: boolean, required: false }
          - { label: Breadcrumbs, name: showBreadcrumbs, widget: boolean, required: false }
          - { label: Tags & Categories, name: showTaxonomies, widget: boolean, required: false }
          - { label: Author Block, name: showAuthor, widget: boolean, required: false, default: true }
          - { label: Reading Time, name: showReadingTime, widget: boolean, required: false, default: true }
          - { label: Word Count, name: showWordCount, widget: boolean, required: false, default: true }
          - { label: Comments, name: showComments, widget: boolean, required: false }
          - { label: Pagination Nav, name: showPagination, widget: boolean, required: false, default: true }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Categories, name: categories, widget: list, required: false }
      - { label: External URL, name: externalUrl, widget: string, required: false, hint: 'Redirect to external site' }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: achievements
    label: Achievements
    label_singular: Achievement
    folder: content/achievements
    path: '{{slug}}/index'
    create: true
    format: frontmatter
    slug: '{{slug}}'
    nested:
      depth: 100
      summary: '{{title}}'
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Weight, name: weight, widget: number, required: false, hint: 'Lower = higher in list' }
      - label: 'Feature Image'
        name: media
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Image, name: featureimage, widget: image, required: false }
          - { label: Caption, name: featureimagecaption, widget: string, required: false }
          - { label: Hero Style, name: heroStyle, widget: select, options: ['basic', 'big', 'background', 'thumbAndBackground'], required: false }
      - label: 'Visibility Toggles'
        name: display
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Table of Contents, name: showTableOfContents, widget: boolean, required: false }
          - { label: Breadcrumbs, name: showBreadcrumbs, widget: boolean, required: false }
          - { label: Tags & Categories, name: showTaxonomies, widget: boolean, required: false }
          - { label: Author Block, name: showAuthor, widget: boolean, required: false, default: true }
          - { label: Reading Time, name: showReadingTime, widget: boolean, required: false, default: true }
          - { label: Word Count, name: showWordCount, widget: boolean, required: false, default: true }
          - { label: Comments, name: showComments, widget: boolean, required: false }
          - { label: Pagination Nav, name: showPagination, widget: boolean, required: false, default: true }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Categories, name: categories, widget: list, required: false }
      - { label: External URL, name: externalUrl, widget: string, required: false, hint: 'Redirect to external site' }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: ctfs
    label: CTFs
    label_singular: CTF
    folder: content/ctfs
    path: '{{slug}}/index'
    create: true
    format: frontmatter
    slug: '{{slug}}'
    nested:
      depth: 100
      summary: '{{title}}'
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Weight, name: weight, widget: number, required: false, hint: 'Lower = higher in list' }
      - label: 'Feature Image'
        name: media
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Image, name: featureimage, widget: image, required: false }
          - { label: Caption, name: featureimagecaption, widget: string, required: false }
          - { label: Hero Style, name: heroStyle, widget: select, options: ['basic', 'big', 'background', 'thumbAndBackground'], required: false }
      - label: 'Visibility Toggles'
        name: display
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Table of Contents, name: showTableOfContents, widget: boolean, required: false }
          - { label: Breadcrumbs, name: showBreadcrumbs, widget: boolean, required: false }
          - { label: Tags & Categories, name: showTaxonomies, widget: boolean, required: false }
          - { label: Author Block, name: showAuthor, widget: boolean, required: false, default: true }
          - { label: Reading Time, name: showReadingTime, widget: boolean, required: false, default: true }
          - { label: Word Count, name: showWordCount, widget: boolean, required: false, default: true }
          - { label: Comments, name: showComments, widget: boolean, required: false }
          - { label: Pagination Nav, name: showPagination, widget: boolean, required: false, default: true }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Categories, name: categories, widget: list, required: false }
      - { label: External URL, name: externalUrl, widget: string, required: false, hint: 'Redirect to external site' }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    path: '{{slug}}/index'
    create: true
    format: frontmatter
    slug: '{{slug}}'
    nested:
      depth: 100
      summary: '{{title}}'
    meta:
      path:
        widget: string
        label: 'Path'
        index_file: 'index'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Weight, name: weight, widget: number, required: false, hint: 'Lower = higher in list' }
      - label: 'Feature Image'
        name: media
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Image, name: featureimage, widget: image, required: false }
          - { label: Caption, name: featureimagecaption, widget: string, required: false }
          - { label: Hero Style, name: heroStyle, widget: select, options: ['basic', 'big', 'background', 'thumbAndBackground'], required: false }
      - label: 'Visibility Toggles'
        name: display
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Table of Contents, name: showTableOfContents, widget: boolean, required: false }
          - { label: Breadcrumbs, name: showBreadcrumbs, widget: boolean, required: false }
          - { label: Tags & Categories, name: showTaxonomies, widget: boolean, required: false }
          - { label: Author Block, name: showAuthor, widget: boolean, required: false, default: true }
          - { label: Reading Time, name: showReadingTime, widget: boolean, required: false, default: true }
          - { label: Word Count, name: showWordCount, widget: boolean, required: false, default: true }
          - { label: Comments, name: showComments, widget: boolean, required: false }
          - { label: Pagination Nav, name: showPagination, widget: boolean, required: false, default: true }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Categories, name: categories, widget: list, required: false }
      - { label: External URL, name: externalUrl, widget: string, required: false, hint: 'Redirect to external site' }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    files:
      - label: About
        name: about
        file: content/about/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - label: Resume
        name: resume
        file: content/resume/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }

  - name: settings
    label: Settings
    files:
      - label: Profile
        name: profile
        file: config/_default/languages.en.toml
        format: toml
        fields:
          - { label: Site Title, name: title, widget: string }
          - { label: Language Code, name: locale, widget: string, default: 'en' }
          - label: Params
            name: params
            widget: object
            fields:
              - { label: Description, name: description, widget: text, required: false }
              - { label: Copyright, name: copyright, widget: string, required: false }
              - { label: Header Logo, name: logo, widget: image, required: false }
              - label: Author
                name: author
                widget: object
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Avatar, name: image, widget: image, required: false }
                  - { label: Headline, name: headline, widget: string, required: false }
                  - { label: Rotating Headlines, name: headlines, widget: list, required: false }
                  - { label: Bio, name: bio, widget: text, required: false }

      - label: Theme
        name: theme
        file: config/_default/params.toml
        format: toml
        fields:
          - { label: Color Scheme, name: colorScheme, widget: select, options: ['blowfish', 'slate', 'autumn', 'avocado', 'bloody', 'congo', 'fire', 'forest', 'github', 'marvel', 'neon', 'noir', 'one-light', 'princess', 'terminal'], default: 'slate' }
          - { label: Default Appearance, name: defaultAppearance, widget: select, options: ['light', 'dark'], default: 'light' }
          - { label: Auto Switch Appearance, name: autoSwitchAppearance, widget: boolean, default: true }

          - label: Header / Navbar
            name: header
            widget: object
            required: false
            fields:
              - { label: Layout Style, name: layout, widget: select, options: ['basic', 'fixed', 'fixed-fill', 'fixed-gradient', 'fixed-fill-blur'], default: 'basic', required: false }
          - label: Footer
            name: footer
            widget: object
            required: false
            fields:
              - { label: Show Menu, name: showMenu, widget: boolean, default: true, required: false }
              - { label: Show Copyright, name: showCopyright, widget: boolean, default: true, required: false }
              - { label: Show Theme Credit, name: showThemeAttribution, widget: boolean, default: true, required: false }
              - { label: Show Appearance Switcher, name: showAppearanceSwitcher, widget: boolean, default: true, required: false }
              - { label: Show Scroll to Top, name: showScrollToTop, widget: boolean, default: true, required: false }
          - label: Homepage
            name: homepage
            widget: object
            required: false
            fields:
              - { label: Layout, name: layout, widget: select, options: ['page', 'profile', 'hero', 'card', 'background', 'custom'], default: 'profile', required: false }
              - { label: Background Image/Video, name: homepageImage, widget: file, required: false }
              - { label: Show Recent Items, name: showRecent, widget: boolean, default: true, required: false }
              - { label: Recent Items Count, name: showRecentItems, widget: number, default: 5, required: false }
          - { label: Main Sections, name: mainSections, widget: list, required: false }
          - label: 'Fonts'
            name: fonts
            widget: object
            required: false
            fields:
              - { label: Google Fonts URL, name: fontUrl, widget: string, required: false }
              - { label: Body Font Family, name: fontBody, widget: string, required: false }
              - { label: Heading Font Family, name: fontHeading, widget: string, required: false }
          - label: 'SEO'
            name: general
            widget: object
            required: false
            collapsed: true
            fields:
              - { label: Enable Search, name: enableSearch, widget: boolean, default: true, required: false }
              - { label: Code Copy Button, name: enableCodeCopy, widget: boolean, required: false }
              - { label: Default Social Image, name: defaultSocialImage, widget: image, required: false }

      - label: Menus
        name: menus
        file: config/_default/menus.en.toml
        format: toml
        fields:
          - label: Main Navbar
            name: main
            widget: list
            required: false
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Page Ref, name: pageRef, widget: string, required: false }
              - { label: External URL, name: url, widget: string, required: false }
              - { label: Weight, name: weight, widget: number, required: false }
              - { label: Icon, name: pre, widget: string, required: false }
          - label: Footer Menu
            name: footer
            widget: list
            required: false
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Page Ref, name: pageRef, widget: string, required: false }
              - { label: External URL, name: url, widget: string, required: false }
              - { label: Weight, name: weight, widget: number, required: false }

      - label: Site Config
        name: siteConfig
        file: config/_default/hugo.toml
        format: raw
        fields:
          - { label: Content, name: body, widget: text }
