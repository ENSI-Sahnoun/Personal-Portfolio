<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    #cms-push-btn {
      position:fixed;bottom:20px;right:20px;z-index:9999;
      padding:10px 20px;background:#4a5568;color:#fff;
      border:none;border-radius:8px;cursor:pointer;font-size:14px;
      box-shadow:0 2px 8px rgba(0,0,0,.3);
    }
    #cms-push-btn:hover { background:#5a6578; }
    #cms-push-btn:disabled { opacity:.6;cursor:not-allowed; }
    #cms-push-btn.pushing { background:#2d3748; }
    #cms-clean-btn {
      position:fixed;bottom:70px;right:20px;z-index:9999;
      padding:10px 20px;background:#6c5ce7;color:#fff;
      border:none;border-radius:8px;cursor:pointer;font-size:14px;
      box-shadow:0 2px 8px rgba(0,0,0,.3);
    }
    #cms-clean-btn:hover { background:#7c6cf7; }
    #cms-clean-btn:disabled { opacity:.6;cursor:not-allowed; }
    #cms-clean-btn.working { background:#5a4bd1; }
    #cms-clean-btn.success { background:#2ecc71; }
    #cms-clean-btn.error { background:#e74c3c; }
    #cms-push-btn.success { background:#2ecc71; }
    #cms-push-btn.error { background:#e74c3c; }

    #cms-status {
      position:fixed;bottom:20px;left:20px;z-index:9999;
      font:12px/1.4 system-ui,sans-serif;display:flex;align-items:center;gap:6px;
      background:rgba(26,26,46,.85);color:#e0e0e0;padding:6px 10px;
      border-radius:6px;cursor:pointer;max-width:40vw;
    }
    #cms-status .dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
    #cms-status .dot.green { background:#2ecc71; }
    #cms-status .dot.yellow { background:#f1c40f; }
    #cms-status .dot.red { background:#e74c3c; }
    #cms-status .clean { color:#2ecc71; }
    #cms-status .changed { color:#f1c40f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px; }
    #cms-status .changed:hover { overflow:visible;white-space:normal;word-break:break-all; }

    .cms-overlay {
      position:fixed;inset:0;z-index:10000;
      background:rgba(0,0,0,.6);display:flex;
      align-items:center;justify-content:center;
    }
    .cms-dialog {
      background:#1a1a2e;color:#e0e0e0;padding:24px;
      border-radius:12px;min-width:360px;max-width:500px;
      max-height:80vh;overflow-y:auto;font:14px/1.5 system-ui,sans-serif;
      box-shadow:0 8px 32px rgba(0,0,0,.5);
    }
    .cms-dialog h3 { margin:0 0 12px;font-size:16px;color:#fff; }
    .cms-dialog label {
      display:flex;align-items:center;gap:8px;
      padding:6px 8px;border-radius:6px;cursor:pointer;
    }
    .cms-dialog label:hover { background:rgba(255,255,255,.05); }
    .cms-dialog input[type=checkbox] { accent-color:#6c5ce7; }
    .cms-dialog .actions {
      display:flex;gap:8px;justify-content:flex-end;margin-top:16px;
    }
    .cms-dialog .actions button {
      padding:8px 16px;border:none;border-radius:6px;
      cursor:pointer;font-size:13px;
    }
    .cms-dialog .actions .cancel { background:#4a5568;color:#fff; }
    .cms-dialog .actions .delete { background:#e74c3c;color:#fff; }
    .cms-dialog .actions .delete:disabled { opacity:.5;cursor:not-allowed; }
    .cms-dialog .empty-msg { color:#888;text-align:center;padding:20px 0; }
    .cms-dialog .select-all {
      padding:4px 8px;font-size:12px;background:transparent;
      color:#6c5ce7;border:1px solid #6c5ce7;border-radius:4px;cursor:pointer;
      margin-bottom:8px;
    }
    .cms-dialog .select-all:hover { background:#6c5ce7;color:#fff; }
  </style>
</head>
<body>
  <div id="cms-status" onclick="refreshStatus()">
    <span class="dot" id="status-dot"></span>
    <span id="status-git"></span>
  </div>
  <button id="cms-push-btn" onclick="pushToGitHub()">Push to GitHub</button>
  <button id="cms-clean-btn" onclick="scanEmpty()">Clean empty folders</button>
  <div id="cms-overlay-container"></div>
  <script src="https://unpkg.com/decap-cms@3.14.0/dist/decap-cms.js"></script>
  <script>
    import('https://esm.sh/decap-cms-media-library-uploadcare@3.1.0').then(function(mod) {
      CMS.registerMediaLibrary(mod.DecapCmsMediaLibraryUploadcare, {
        publicKey: 'ae77b5e15dc21e25d8e6'
      });
    }).catch(function(err) {
      console.error('Uploadcare media library failed to load:', err);
    });

    var STATUS_URL = "http://localhost:8082/status";
    var PUSH_URL = "http://localhost:8082/push";
    var CLEAN_URL = "http://localhost:8082/clean-empty";

    function qs(id) { return document.getElementById(id); }

    function refreshStatus() {
      var dot = qs("status-dot"), git = qs("status-git");
      dot.className = "dot yellow";
      git.textContent = "checking...";

      fetch(STATUS_URL).then(function(r) { return r.json(); }).then(function(data) {
        if (data.running) {
          dot.className = "dot " + (data.dirty ? "yellow" : "green");
          if (data.dirty && data.files.length > 0) {
            git.innerHTML = '<span class="changed">\u2716 ' + data.files.length + ' uncommitted</span>';
            git.title = data.files.map(function(f) { return f.path; }).join("\n");
          } else {
            git.innerHTML = '<span class="clean">\u2714 clean</span>';
            git.title = "";
          }
        } else {
          dot.className = "dot red";
          git.textContent = "offline";
          git.title = "";
        }
      }).catch(function() {
        dot.className = "dot red";
        git.textContent = "offline";
        git.title = "";
      });
    }

    function pushToGitHub() {
      var btn = qs("cms-push-btn");
      btn.className = "pushing";
      btn.disabled = true;
      btn.textContent = "Pushing...";
      fetch(PUSH_URL).then(function(r) {
        return r.text().then(function(m) {
          if (r.ok) { return m; }
          throw new Error(m);
        });
      }).then(function(m) {
        btn.className = "success";
        btn.textContent = "\u2713 " + m;
        refreshStatus();
        setTimeout(function() { btn.className = ""; btn.textContent = "Push to GitHub"; btn.disabled = false; }, 3000);
      }).catch(function(e) {
        btn.className = "error";
        btn.textContent = "\u2716 " + (e.message || "Failed — server running?");
        setTimeout(function() { btn.className = ""; btn.textContent = "Push to GitHub"; btn.disabled = false; }, 8000);
      });
    }

    function scanEmpty() {
      var btn = qs("cms-clean-btn");
      btn.className = "working";
      btn.disabled = true;
      btn.textContent = "Scanning...";
      fetch(CLEAN_URL).then(function(r) { return r.json(); }).then(function(d) {
        btn.className = "";
        btn.disabled = false;
        btn.textContent = "Clean empty folders";
        showDialog(d.empty || []);
      }).catch(function() {
        btn.className = "error";
        btn.textContent = "\u2716 Failed";
        setTimeout(function() { btn.className = ""; btn.textContent = "Clean empty folders"; btn.disabled = false; }, 4000);
      });
    }

    function showDialog(emptyDirs) {
      var container = qs("cms-overlay-container");
      if (emptyDirs.length === 0) {
        container.innerHTML = '<div class="cms-overlay"><div class="cms-dialog"><h3>Clean empty folders</h3><div class="empty-msg">No empty folders found</div><div class="actions"><button class="cancel" onclick="closeDialog()">OK</button></div></div></div>';
        return;
      }
      var items = emptyDirs.map(function(p, i) {
        return '<label><input type="checkbox" class="cms-folder-cb" value="' + p + '" checked> ' + p + '</label>';
      }).join("");
      container.innerHTML = '<div class="cms-overlay"><div class="cms-dialog"><h3>Select folders to delete</h3><button class="select-all" id="cms-select-all" onclick="toggleAll()">Toggle all</button>' + items + '<div class="actions"><button class="cancel" onclick="closeDialog()">Cancel</button><button class="delete" id="cms-delete-btn" onclick="deleteSelected()">Delete selected</button></div></div></div>';
    }

    function toggleAll() {
      var cbs = document.querySelectorAll(".cms-folder-cb");
      var checked = Array.from(cbs).every(function(c) { return c.checked; });
      cbs.forEach(function(c) { c.checked = !checked; });
    }

    function closeDialog() {
      qs("cms-overlay-container").innerHTML = "";
    }

    function deleteSelected() {
      var cbs = document.querySelectorAll(".cms-folder-cb:checked");
      var paths = Array.from(cbs).map(function(c) { return c.value; });
      if (paths.length === 0) return;
      var btn = qs("cms-delete-btn");
      btn.disabled = true;
      btn.textContent = "Deleting...";
      fetch(CLEAN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paths: paths }),
      }).then(function(r) { return r.json(); }).then(function(d) {
        closeDialog();
        var cleanBtn = qs("cms-clean-btn");
        cleanBtn.className = "success";
        cleanBtn.textContent = "\u2713 Deleted " + d.removed + " folder" + (d.removed > 1 ? "s" : "");
        refreshStatus();
        setTimeout(function() { cleanBtn.className = ""; cleanBtn.textContent = "Clean empty folders"; }, 4000);
      }).catch(function() {
        btn.disabled = false;
        btn.textContent = "Delete selected";
      });
    }

    refreshStatus();
    setInterval(refreshStatus, 10000);
  </script>
</body>
</html>
