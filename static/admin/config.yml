        name: about
        file: content/about/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - label: Resume
        name: resume
        file: content/resume/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }

  - name: settings
    label: Settings
    files:
      - label: Profile
        name: profile
        file: config/_default/languages.en.toml
        format: toml
        fields:
          - { label: Site Title, name: title, widget: string }
          - { label: Language Code, name: locale, widget: string, default: 'en' }
          - label: Params
            name: params
            widget: object
            fields:
              - { label: Description, name: description, widget: text, required: false }
              - { label: Copyright, name: copyright, widget: string, required: false }
              - { label: Header Logo, name: logo, widget: image, required: false, hint: 'Place in assets/img/, e.g. img/logo.png' }
              - label: Author
                name: author
                widget: object
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Image, name: image, widget: image, required: false, hint: 'Place image in assets/img/' }
                  - { label: Headline, name: headline, widget: string, required: false }
                  - { label: Bio, name: bio, widget: text, required: false }

      - label: Theme
        name: theme
        file: config/_default/params.toml
        format: toml
        fields:
          - { label: Color Scheme, name: colorScheme, widget: select, options: ['blowfish', 'slate', 'autumn', 'avocado', 'bloody', 'congo', 'fire', 'forest', 'github', 'marvel', 'neon', 'noir', 'one-light', 'princess', 'terminal'], default: 'slate' }
          - { label: Default Appearance, name: defaultAppearance, widget: select, options: ['light', 'dark'], default: 'light' }
          - { label: Auto Switch Appearance, name: autoSwitchAppearance, widget: boolean, default: true }

          - label: General
            name: general
            widget: object
            required: false
            collapsed: true
            fields:
              - { label: Enable Search, name: enableSearch, widget: boolean, default: true, required: false }
              - { label: Enable Code Copy, name: enableCodeCopy, widget: boolean, required: false }
              - { label: Enable Accessibility, name: enableA11y, widget: boolean, required: false }
              - { label: Enable Structured Breadcrumbs, name: enableStructuredBreadcrumbs, widget: boolean, required: false }
              - { label: Reply By Email, name: replyByEmail, widget: boolean, required: false }
              - { label: Disable Image Optimization, name: disableImageOptimization, widget: boolean, required: false }
              - { label: Background Image Width (px), name: backgroundImageWidth, widget: number, default: 2560, required: false, hint: 'Higher = better quality but slower. 1920 or 2560 recommended.' }
              - { label: Disable Text In Header, name: disableTextInHeader, widget: boolean, required: false }
              - { label: Hotlink Feature Image, name: hotlinkFeatureImage, widget: boolean, required: false }
              - { label: Fingerprint Algorithm, name: fingerprintAlgorithm, widget: select, options: ['sha512', 'sha384', 'sha256'], default: 'sha512', required: false }
              - { label: Thumbnail Aspect Ratio, name: thumbnailAspectRatio, widget: string, required: false, hint: 'e.g. "1.5", "1.0"' }
              - { label: Image Position, name: imagePosition, widget: string, required: false, hint: 'e.g. "50% 50%"' }
              - { label: Highlight Current Menu, name: highlightCurrentMenuArea, widget: boolean, default: true, required: false }
              - { label: Smart TOC, name: smartTOC, widget: boolean, default: true, required: false }
              - { label: Smart TOC Hide Unfocused, name: smartTOCHideUnfocusedChildren, widget: boolean, default: true, required: false }
              - { label: Default Background Image, name: defaultBackgroundImage, widget: file, required: false, hint: 'Image or video for article/list hero backgrounds' }
              - { label: Default Featured Image, name: defaultFeaturedImage, widget: image, required: false }
              - { label: Default Social Image, name: defaultSocialImage, widget: image, required: false }

          - label: Article Defaults
            name: articleDefaults
            widget: object
            required: false
            collapsed: true
            fields:
              - { label: Hero Style, name: heroStyle, widget: select, options: ['basic', 'big', 'background', 'thumbAndBackground'], required: false }
              - { label: Show Date, name: showDate, widget: boolean, default: true, required: false }
              - { label: Show Date Updated, name: showDateUpdated, widget: boolean, required: false }
              - { label: Show Date Only In Article, name: showDateOnlyInArticle, widget: boolean, required: false }
              - { label: Show Reading Time, name: showReadingTime, widget: boolean, default: true, required: false }
              - { label: Show Word Count, name: showWordCount, widget: boolean, default: true, required: false }
              - { label: Show Table of Contents, name: showTableOfContents, widget: boolean, required: false }
              - { label: Show Breadcrumbs, name: showBreadcrumbs, widget: boolean, required: false }
              - { label: Show Taxonomies, name: showTaxonomies, widget: boolean, required: false }
              - { label: Show Categories, name: showCategories, widget: boolean, default: true, required: false }
              - { label: Show Tags, name: showTags, widget: boolean, default: true, required: false }
              - { label: Show Categories In Secondary Color, name: showCategoriesInSecondaryColor, widget: boolean, required: false }
              - { label: Show Authors Badges, name: showAuthorsBadges, widget: boolean, required: false }
              - { label: Show Pagination, name: showPagination, widget: boolean, default: true, required: false }
              - { label: Invert Pagination, name: invertPagination, widget: boolean, required: false }
              - { label: Show Author, name: showAuthor, widget: boolean, default: true, required: false }
