              - { label: URL, name: url, widget: string, required: false, hint: 'External link' }
              - { label: Weight, name: weight, widget: number, required: false, hint: 'Lower = higher in list' }
              - { label: Icon, name: pre, widget: string, required: false, hint: 'Icon name (e.g. github)' }

