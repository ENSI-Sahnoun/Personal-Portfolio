backend:
  name: proxy
  proxy_url: http://localhost:8081/api/v1
  branch: main

media_folder: assets/img
public_folder: img

slug:
  encoding: ascii
  clean_accents: true

# ---------------------------------------------------------------------------
# COLLECTIONS
# ---------------------------------------------------------------------------

collections:

  # ── WRITEUPS ──────────────────────────────────────────────────────────────
  - name: writeups
    label: Writeups
    label_singular: Writeup
    folder: content/writeups
    create: true
    format: frontmatter
    sortable_fields: [date, title, weight]
    nested:
      depth: 100
      summary: '{{title}} — {{date}} | {{category}}'
    meta:
      path:
        widget: string
        label: Path
        index_file: '_index'
    view_filters:
      - label: Crypto
        field: category
        pattern: crypto
      - label: Web
        field: category
        pattern: web
      - label: Pwn
        field: category
        pattern: pwn
      - label: Reverse
        field: category
        pattern: reverse
      - label: Forensics
        field: category
        pattern: forensics
      - label: OSINT
        field: category
        pattern: osint
      - label: Misc
        field: category
        pattern: misc
      - label: Malware
        field: category
        pattern: malware
      - label: Drafts Only
        field: draft
        pattern: true
    view_groups:
      - label: Category
        field: category
      - label: Year
        field: date
        pattern: \d{4}
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Slug, name: slug, widget: string, required: false, hint: 'URL slug — leave blank to auto-generate from title' }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - label: Category
        name: category
        widget: select
        options: [crypto, web, pwn, reverse, forensics, osint, misc, malware]
        required: false
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Feature Image, name: featureimage, widget: image, required: false }
      - { label: Image Caption, name: featureimagecaption, widget: string, required: false }
      - label: Hero
        name: media
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Show Hero, name: showHero, widget: boolean, default: false }
          - label: Hero Style
            name: heroStyle
            widget: select
            options: [basic, big, background, thumbAndBackground]
            required: false
            default: basic
      - label: Display
        name: display
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Show Date, name: showDate, widget: boolean, required: false }
          - { label: Table of Contents, name: showTableOfContents, widget: boolean, required: false }
          - { label: Breadcrumbs, name: showBreadcrumbs, widget: boolean, required: false }
          - { label: Tags & Categories, name: showTaxonomies, widget: boolean, required: false }
          - { label: Author Block, name: showAuthor, widget: boolean, required: false }
          - { label: Reading Time, name: showReadingTime, widget: boolean, required: false }
          - { label: Word Count, name: showWordCount, widget: boolean, required: false }
          - { label: Comments, name: showComments, widget: boolean, required: false }
          - { label: Pagination, name: showPagination, widget: boolean, required: false }
          - { label: Heading Anchors, name: showHeadingAnchors, widget: boolean, required: false }
      - label: Layout
        name: layout_opts
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Background Blur, name: layoutBackgroundBlur, widget: boolean, required: false }
          - { label: Header Space, name: layoutBackgroundHeaderSpace, widget: boolean, required: false }
          - { label: Group by Year, name: groupByYear, widget: boolean, required: false }
      - { label: Weight, name: weight, widget: number, required: false, value_type: int, hint: 'Lower = higher in list' }
      - { label: External URL, name: externalUrl, widget: string, required: false, hint: 'Redirect visitors to this URL instead of showing content' }
      - { label: Body, name: body, widget: markdown }

